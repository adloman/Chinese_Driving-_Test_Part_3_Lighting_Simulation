<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subject 3 Road Test - Pro Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="sidebar">
        <h4>PROGRESS</h4>
        <div id="audit-log"></div>
    </div>

    <div id="stage">
        <div id="display">
            <div id="pinyin" class="hidden-text">Ready</div>
            <div id="english" class="hidden-text">Press Start</div>
            
            <div class="toggle-row">
                <button onclick="toggleText('pinyin',)" class="btn-toggle">ZH</button>
                <button onclick="toggleText('english')" class="btn-toggle">EN</button>
            </div>
            
            <div id="status-msg"></div>
        </div>
        
        <div id="timer-box"><div id="timer-bar"></div></div>

        <div id="alert-zone">
            <div id="fail-banner" class="fail-banner">
                <p class="fail-title">F<span class="crooked-letter">A</span>ILED</p>
                <button class="btn-continue" onclick="closeAlert()">CONTINUE</button>
            </div>
            <div id="pass-banner" class="fail-banner" style="border-color: #00C851; background: rgba(0, 200, 81, 0.1);">
                <p class="fail-title" style="color: #00C851;">EXAM PASSED</p>
                <button class="btn-continue" style="background: #00C851;" onclick="location.reload()">RESTART</button>
            </div>
        </div>

        <div id="dashboard-root"></div>
    </div>

    <div id="start-screen" class="overlay-screen">
        <button onclick="initGame()" class="start-btn">START TEST</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
